                                                    {superModal === 'nurses' && (h.nurses ? Object.keys(h.nurses).length : 0)}
                                                    {superModal === 'profit' && formatMoney(h.transactions ? Object.values(h.transactions).reduce((s, tx) => tx.type === 'deduction' ? s + tx.amount : s, 0) : 0)}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                )}
                <AddHospitalModal
                    isOpen={showAddHospital}
                    onClose={()=>setShowAddHospital(false)}
                    onSuccess={() => {
                        setToast({type: 'success', msg: 'Hospital Added'});
                        setTimeout(()=>setToast(null), 2000);
                    }}
                />
            </div>
        );
    };
    const LoginScreen = () => {
        const [email, setEmail] = useState('');
        const [pass, setPass] = useState('');
        const [loading, setLoading] = useState(false);
        const handleSubmit = async (e) => {
            e.preventDefault();
            setLoading(true);
            try {
                await auth.signInWithEmailAndPassword(email, pass);
            } catch (err) {
                alert(err.message);
            } finally {
                setLoading(false);
            }
        };
        return (
            <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50 relative overflow-hidden">
                <div className="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-blue-200/30 rounded-full blur-3xl"></div>
                <div className="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-indigo-200/30 rounded-full blur-3xl"></div>
                <div className="bg-white/80 backdrop-blur-xl w-full max-w-md p-8 rounded-3xl shadow-2xl border border-white z-10 fade-in">
                    <div className="text-center mb-10">
                        <div className="w-16 h-16 bg-blue-600 rounded-2xl mx-auto flex items-center justify-center shadow-lg shadow-blue-300 mb-4">
                            <i className="fas fa-heartbeat text-3xl text-white"></i>
                        </div>
                        <h1 className="text-3xl font-extrabold text-slate-800 tracking-tight">SalineGuard</h1>
                        <p className="text-slate-500 font-medium">Enterprise Network</p>
                    </div>
                    <form onSubmit={handleSubmit} className="space-y-5">
                        <div className="space-y-1">
                            <label className="text-[10px] uppercase font-bold text-slate-400 ml-1">Secure ID</label>
                            <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="username@hospital.branch" className="w-full p-4 bg-slate-50 rounded-xl border border-slate-200 outline-none focus:border-blue-500 transition-colors font-medium text-slate-700" required />
                        </div>
                        <div className="space-y-1">
                            <label className="text-[10px] uppercase font-bold text-slate-400 ml-1">Password</label>
                            <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" className="w-full p-4 bg-slate-50 rounded-xl border border-slate-200 outline-none focus:border-blue-500 transition-colors font-medium text-slate-700" required />
                        </div>
                  
                        <button disabled={loading} className="w-full bg-slate-900 hover:bg-black text-white py-4 rounded-xl font-bold shadow-xl shadow-slate-200 active:scale-95 transition-all">
                            {loading ? <i className="fas fa-circle-notch fa-spin"></i> : 'Authenticate'}
                        </button>
                    </form>
                    <div className="mt-8 text-center space-y-2">
                        <p className="text-xs font-bold text-slate-400">Forgot password? Contact your Hospital Admin.</p>
                        <p className="text-xs text-slate-400">New Nurse? Contact your hospital admin to create an account.</p>
                    </div>
                </div>
            </div>
        );
    };
    const App = () => {
        const [user, setUser] = useState(null);
        const [loading, setLoading] = useState(true);
        useEffect(() => {
            const unsub = auth.onAuthStateChanged((u) => {
                setUser(u);
                setLoading(false);
            });
            return () => unsub();
        }, []);
        if (loading) return <LoadingScreen />;
        if (!user) return <LoginScreen />;
        const info = getHospitalInfo(user.email);
  
        if (info.id === 'super_admin') return <SuperDashboard onLogout={()=>auth.signOut()} />;
        if (user.email.startsWith('admin@')) return (
            <div className="min-h-screen bg-slate-50">
                <AppHeader title={info.name} subtitle="Hospital Administration" onLogout={()=>auth.signOut()} showWallet={null} />
                <div className="p-4 md:p-6 max-w-7xl mx-auto">
                    <HospitalDashboard hospitalId={info.id} userRole="admin" />
                </div>
            </div>
        );
        return <NurseApp user={user} onLogout={()=>auth.signOut()} />;
    };
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
